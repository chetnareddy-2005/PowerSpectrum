<!doctype html>
<html>
  <head>
    <title>Radar Graph Viewer</title>
    <style>
      /* === Star Background === */
      body {
        margin: 0;
        background: black;
        color: white;
        text-align: center;
        position: relative;
        font-family: Arial, sans-serif;
      }
      .stars {
        position: fixed;
        width: 100%;
        height: 100%;
        top: 0;
        left: 0;
        pointer-events: none;
        z-index: 0;
      }
      .star {
        position: absolute;
        border-radius: 50%;
        opacity: 0.8;
        animation-name: twinkle;
        animation-iteration-count: infinite;
        animation-direction: alternate;
      }
      .star.white {
        background-color: white;
        filter: drop-shadow(0 0 3px white);
      }
      .star.purple {
        background-color: #b19cd9;
        filter: drop-shadow(0 0 4px #b19cd9);
      }
      .star.blue {
        background-color: #8ac6ff;
        filter: drop-shadow(0 0 4px #8ac6ff);
      }
      @keyframes twinkle {
        0% {
          opacity: 0.2;
        }
        100% {
          opacity: 1;
        }
      }

      /* === Main Content === */
      .content-wrapper {
        position: relative;
        z-index: 1;
        padding-top: 20px;
      }

      .container {
        display: flex;
        justify-content: space-around;
        margin-top: 20px;
      }
      .panel {
        border: 1px solid #ccc;
        border-radius: 8px;
        padding: 15px;
        width: 40%;
        background: rgba(255, 255, 255, 0.95);
        color: black;
      }
      h3 {
        margin-top: 0;
      }
      img {
        max-width: 80%;
        margin: 10px 0;
        border: 1px solid #ccc;
        border-radius: 8px;
      }

      /* Tabs */
      .tabs {
        margin-top: 30px;
      }
      .tab-buttons {
        display: flex;
        justify-content: center;
        margin-bottom: 15px;
      }
      .tab-buttons button {
        margin: 0 10px;
        padding: 10px 20px;
        font-weight: bold;
        border: none;
        border-radius: 6px;
        background: #ddd;
        cursor: pointer;
        transition: background 0.3s;
      }
      .tab-buttons button.active {
        background: #007bff;
        color: white;
      }
      .tab-content {
        display: none;
      }
      .tab-content.active {
        display: block;
      }

      button[type="submit"] {
        padding: 10px 20px;
        font-size: 16px;
        border-radius: 5px;
        border: none;
        margin: 10px;
        background: #007bff;
        color: white;
        cursor: pointer;
        font-weight: bold;
      }
      button[type="submit"]:hover {
        background: #0056b3;
      }

      input[type="file"],
      input[type="number"] {
        padding: 8px;
        font-size: 14px;
        border-radius: 4px;
        border: 1px solid #ccc;
        margin: 5px;
      }

      label {
        color: black;
      }

      h2 {
        color: white;
      }
    </style>
  </head>
  <body>
    <!-- Star background layer -->
    <div class="stars" id="stars-container"></div>

    <!-- Main content -->
    <div class="content-wrapper">
    <h2>Upload Radar Files</h2>

    <!-- Upload form -->
    <form
      id="upload-form"
      enctype="multipart/form-data"
      method="POST"
      action="/upload"
    >
      <div class="container">
        <!-- Reference Panel -->
        <div class="panel">
          <h3>Reference File</h3>
          <input type="file" name="ref_file" /><br /><br />
          <label>Cycle Skip:</label>
          <input type="number" name="ref_skip" value="0" min="0" /><br /><br />
          <label>Cycle Analyze:</label>
          <input type="number" name="ref_analyze" value="1" min="1" />
        </div>

        <!-- Test Panel -->
        <div class="panel">
          <h3>Test File</h3>
          <input type="file" name="test_file" required /><br /><br />
          <label>Cycle Skip:</label>
          <input type="number" name="test_skip" value="0" min="0" /><br /><br />
          <label>Cycle Analyze:</label>
          <input type="number" name="test_analyze" value="1" min="1" />
        </div>
      </div>

      <br />
      <button type="submit">Upload & Process</button>
    </form>

    <!-- Tabbed Graph Viewer -->
    <div
      class="tabs"
      id="graphs"
      {%
      if
      showgraphs
      %}style="display:block;"
      {%
      else
      %}style="display:none;"
      {%
      endif
      %}
    >
      <h2>Generated Graphs</h2>

      <div class="tab-buttons">
        <button class="tab-btn active" data-target="g0">Graph 1</button>
        <button class="tab-btn" data-target="g1">Graph 2</button>
        <button class="tab-btn" data-target="g2">Graph 3</button>
      </div>
      <div class="tab-content active" id="g0">
        <img src="/graph/0?t=" alt="Graph 1" />
      </div>
      <div class="tab-content" id="g1">
        <img src="/graph/1?t=" alt="Graph 2" />
      </div>
      <div class="tab-content" id="g2">
        <img src="/graph/2?t=" alt="Graph 3" />
      </div>
    </div>
    </div>

    <script>
      /* === STAR BACKGROUND GENERATION === */
      const starsContainer = document.getElementById("stars-container");
      const starCount = 150;
      const starTypes = ["white", "purple", "blue"];

      for (let i = 0; i < starCount; i++) {
        const star = document.createElement("div");
        star.classList.add("star", starTypes[Math.floor(Math.random() * starTypes.length)]);

        const size = Math.random() * 2 + 1;
        star.style.width = `${size}px`;
        star.style.height = `${size}px`;

        star.style.top = `${Math.random() * 100}%`;
        star.style.left = `${Math.random() * 100}%`;

        const duration = (Math.random() * 3 + 2).toFixed(2);
        const delay = (Math.random() * 5).toFixed(2);
        star.style.animationDuration = `${duration}s`;
        star.style.animationDelay = `${delay}s`;

        starsContainer.appendChild(star);
      }

      // Add cache-busters to images on page load
      document.querySelectorAll("#graphs img").forEach((img) => {
        img.src = img.src + Date.now();
      });

      // Tab switching
      document.querySelectorAll(".tab-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          // remove active class from all buttons
          document
            .querySelectorAll(".tab-btn")
            .forEach((b) => b.classList.remove("active"));
          btn.classList.add("active");

          // hide all tab contents
          document
            .querySelectorAll(".tab-content")
            .forEach((tab) => tab.classList.remove("active"));

          // show selected tab
          document.getElementById(btn.dataset.target).classList.add("active");
        });
      });
    </script>
  </body>
</html>
