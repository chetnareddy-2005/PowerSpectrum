<!DOCTYPE html> <!-- Declares HTML5 document -->
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spectral Data Viewer</title> <!-- Browser tab title -->
  
  <!-- Load Plotly library for interactive graph plotting -->
  <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
  
  <style>
    /* === General Page Style === */
    body {
      margin: 0; /* Remove default spacing */
      height: 100vh; /* Full viewport height */
      background: black; /* Night sky look */
      color: white; /* White text */
      text-align: center; /* Center text horizontally */
      overflow: hidden; /* Hide scrollbars */
      position: relative; /* Needed for absolute positioned children */
      font-family: Arial, sans-serif;
    }

    /* === Star Background === */
    .stars {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0; left: 0;
      pointer-events: none; /* Clicks pass through */
      z-index: 0; /* Behind main content */
    }
    .star {
      position: absolute;
      border-radius: 50%; /* Makes it circular */
      opacity: 0.8;
      animation-name: twinkle;
      animation-iteration-count: infinite;
      animation-direction: alternate;
    }
    /* Different colored stars with glow */
    .star.white { background-color: white; filter: drop-shadow(0 0 3px white); }
    .star.purple { background-color: #b19cd9; filter: drop-shadow(0 0 4px #b19cd9); }
    .star.blue { background-color: #8ac6ff; filter: drop-shadow(0 0 4px #8ac6ff); }

    /* Animation to make stars flicker */
    @keyframes twinkle {
      0% { opacity: 0.2; }
      100% { opacity: 1; }
    }

    /* === Content Styling === */
    .content {
      position: relative;
      z-index: 1; /* Above stars */
      padding-top: 20px;
    }
    input, button {
      padding: 10px;
      font-size: 16px;
      border-radius: 5px;
      border: none;
      margin: 10px;
    }
    #plot {
      position: relative;
      z-index: 1;
      width: 90%;
      height: 600px;
      margin: auto;
      background-color: black;
    }
  </style>
</head>
<body>

  <!-- Star background layer -->
  <div class="stars" id="stars-container"></div>

  <!-- Main content -->
  <div class="content">
    <h1>Spectral Data Plotter</h1>

    <!-- File upload -->
    <label for="fileInput">Select .d11 File:</label>
    <input type="file" id="fileInput" accept=".d11" title="Choose a .d11 file to upload">
    
    <!-- Frame skip option -->
    <label>Frame Skip:</label>
    <input type="number" id="frameskip" min="0" value="1" title="Enter the number of frames to skip" placeholder="Frames to skip">

    <!-- Plot button -->
    <button onclick="processFile()">Plot Graph</button>
  </div>

  <!-- Where the Plotly graph will appear -->
  <div id="plot"></div>

  <script>
    /* === STAR BACKGROUND GENERATION === */
    const starsContainer = document.getElementById('stars-container');
    const starCount = 150; // total number of stars
    const starTypes = ['white', 'purple', 'blue']; // available colors

    for (let i = 0; i < starCount; i++) {
      const star = document.createElement('div'); // create new div
      // Add 'star' + random color class
      star.classList.add('star', starTypes[Math.floor(Math.random() * starTypes.length)]);

      // Random size 1–3 px
      const size = Math.random() * 2 + 1;
      star.style.width = `${size}px`;
      star.style.height = `${size}px`;

      // Random position across screen
      star.style.top = `${Math.random() * 100}%`;
      star.style.left = `${Math.random() * 100}%`;

      // Random flicker timing
      const duration = (Math.random() * 3 + 2).toFixed(2); // 2–5 sec
      const delay = (Math.random() * 5).toFixed(2); // 0–5 sec
      star.style.animationDuration = `${duration}s`;
      star.style.animationDelay = `${delay}s`;

      // Add star to container
      starsContainer.appendChild(star);
    }

    /* === MAIN FUNCTION TO PROCESS FILE === */
    async function processFile() {
      const file = document.getElementById('fileInput').files[0]; // selected file
      const frameskip = parseInt(document.getElementById('frameskip').value) || 0;

      // If no file selected, show alert
      if (!file) {
        alert("Please select a .d11 file first");
        return;
      }

      // Read file as binary
      const arrayBuffer = await file.arrayBuffer();
      const dataView = new DataView(arrayBuffer); // allows reading binary as int16/int32

      /* === HEADER PARSING (First 64 int16 values) === */
      let A = [];
      for (let i = 0; i < 64; i++) {
        A.push(dataView.getInt16(i * 2, true)); // little-endian order
      }

      // Radar parameters from header
      let baud = A[1];
      let nrgb = A[2];
      let nfft = A[3];
      let nci = A[4];
      let ipp = A[6];
      let nbeam = A[20];

      // Sampling frequency (Hz)
      const fs = 1e6 / (ipp * nci);

      // Frequency axis from -fs/2 to fs/2
      const frequency = Array.from({length: nfft}, (_, i) => -fs/2 + (i * fs / nfft));

      /* === DATA READING === */
      const datasize = nrgb * nfft;
      const frameSizeBytes = 128 + datasize * 4; // header + int32 data
      let startOffset = (frameSizeBytes * frameskip) + 128; // skip frames if needed
      let spectra = [];

      // Loop over each range bin
      for (let rgb = 0; rgb < nrgb; rgb++) {
        let row = [];
        for (let ft = 0; ft < nfft; ft++) {
          const val = dataView.getInt32(startOffset, true); // read int32
          startOffset += 4; // move pointer
          row.push(val);
        }

        // Normalize data
        const maxVal = Math.max(...row.map(Math.abs)) + Math.E; // prevent /0
        row = row.map(v => v / maxVal);

        // Remove DC offset
        const mean = row.reduce((a, b) => a + b, 0) / row.length;
        row = row.map(v => v - mean);

        spectra.push(row);
      }

      /* === FFT SHIFT === */
      spectra = spectra.map(row => {
        const half = Math.floor(row.length / 2);
        return row.slice(half).concat(row.slice(0, half));
  /*Math.floor(row.length / 2) → Finds the index where the array should be split into two equal halves.
 row.slice(half) → Takes the second half (negative frequencies).
.concat(row.slice(0, half)) → Appends the first half (positive frequencies) after the second half.
*/
      });

      /* === PREPARE DATA FOR PLOTTING === */
      const traces = spectra.map((row, idx) => ({
        x: frequency, // frequency axis
        y: row.map(v => Math.abs(v) + 0.02 * idx), // stacked lines
        type: 'scatter',
        mode: 'lines',
        line: {color: 'green'}
      }));
      

      /* === PLOT WITH PLOTLY === */
      Plotly.newPlot('plot', traces, {
        showlegend: false, // This hides the legend(traces)
        paper_bgcolor: 'black', // background
        plot_bgcolor: 'black',
        font: {color: 'white'}, // white text
        xaxis: {title: 'Frequency (Hz)'},
        yaxis: {title: 'Amplitude'}
      });
      
    }
  </script>
</body>
</html>
