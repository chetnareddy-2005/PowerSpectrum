<!DOCTYPE html>
<html>
<head>
  <title>Spectral Data Viewer</title>
  <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: black;
      color: white;
      text-align: center;
      overflow: hidden;
      position: relative;
      font-family: Arial, sans-serif;
    }
    .stars {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0; left: 0;
      pointer-events: none;
      z-index: 0;
    }
    .star {
      position: absolute;
      border-radius: 50%;
      opacity: 0.8;
      animation-name: twinkle;
      animation-iteration-count: infinite;
      animation-direction: alternate;
    }
    .star.white { background-color: white; filter: drop-shadow(0 0 3px white); }
    .star.purple { background-color: #b19cd9; filter: drop-shadow(0 0 4px #b19cd9); }
    .star.blue { background-color: #8ac6ff; filter: drop-shadow(0 0 4px #8ac6ff); }
    @keyframes twinkle {
      0% { opacity: 0.2; }
      100% { opacity: 1; }
    }
    .content {
      position: relative;
      z-index: 1;
      padding-top: 20px;
    }
    input, button {
      padding: 10px;
      font-size: 16px;
      border-radius: 5px;
      border: none;
      margin: 10px;
    }
    #plot {
      position: relative;
      z-index: 1;
      width: 90%;
      height: 500px;
      margin: auto;
      background-color: black;
    }
  </style>
</head>
<body>
  <div class="stars" id="stars-container"></div>
  <div class="content">
    <h1>Spectral Data Plotter</h1>
    <input type="file" id="fileInput" accept=".d11">
    <label>Frame Skip:</label>
    <input type="number" id="frameskip" min="0" value="1">
    <button onclick="processFile()">Plot Graph</button>
  </div>
  <div id="plot"></div>

  <script>
    // Star background
    const starsContainer = document.getElementById('stars-container');
    const starCount = 150;
    const starTypes = ['white', 'purple', 'blue'];
    for (let i = 0; i < starCount; i++) {
      const star = document.createElement('div');
      star.classList.add('star', starTypes[Math.floor(Math.random() * starTypes.length)]);
      const size = Math.random() * 2 + 1;
      star.style.width = `${size}px`;
      star.style.height = `${size}px`;
      star.style.top = `${Math.random() * 100}%`;
      star.style.left = `${Math.random() * 100}%`;
      const duration = (Math.random() * 3 + 2).toFixed(2);
      const delay = (Math.random() * 5).toFixed(2);
      star.style.animationDuration = `${duration}s`;
      star.style.animationDelay = `${delay}s`;
      starsContainer.appendChild(star);
    }

    // Process spectral file
    async function processFile() {
      const file = document.getElementById('fileInput').files[0];
      const frameskip = parseInt(document.getElementById('frameskip').value) || 0;
      if (!file) {
        alert("Please select a .d11 file first");
        return;
      }

      const arrayBuffer = await file.arrayBuffer();
      const dataView = new DataView(arrayBuffer);

      // Parse first 64 int16 values
      let A = [];
      for (let i = 0; i < 64; i++) {
        A.push(dataView.getInt16(i * 2, true));
      }

      let baud = A[1];
      let nrgb = A[2];
      let nfft = A[3];
      let nci = A[4];
      let ipp = A[6];
      let nbeam = A[20];

      const fs = 1e6 / (ipp * nci);
      const frequency = Array.from({length: nfft}, (_, i) => -fs/2 + (i * fs / nfft));
      const datasize = nrgb * nfft;

      // Calculate starting byte for frameskip
      const frameSizeBytes = 128 + datasize * 4;
      let startOffset = (frameSizeBytes * frameskip) + 128;
      let spectra = [];

      for (let rgb = 0; rgb < nrgb; rgb++) {
        let row = [];
        for (let ft = 0; ft < nfft; ft++) {
          const val = dataView.getInt32(startOffset, true);
          startOffset += 4;
          row.push(val);
        }
        const maxVal = Math.max(...row.map(Math.abs)) + Math.E;
        row = row.map(v => v / maxVal);
        const mean = row.reduce((a, b) => a + b, 0) / row.length;
        row = row.map(v => v - mean);
        spectra.push(row);
      }

      // FFT shift
      spectra = spectra.map(row => {
        const half = Math.floor(row.length / 2);
        return row.slice(half).concat(row.slice(0, half));
      });

      // Prepare plot data
      const traces = spectra.map((row, idx) => ({
        x: frequency,
        y: row.map(v => Math.abs(v) + 0.02 * idx),
        type: 'scatter',
        mode: 'lines',
        line: {color: 'yellow'},
        name: `RGB ${idx}`
      }));

      Plotly.newPlot('plot', traces, {
        paper_bgcolor: 'black',
        plot_bgcolor: 'black',
        font: {color: 'white'},
        xaxis: {title: 'Frequency (Hz)'},
        yaxis: {title: 'Amplitude'}
      });
    }
  </script>
</body>
</html>
